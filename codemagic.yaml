workflows:

  # ── iOS — unsigned IPA for SideStore ────────────────────────────────────────
  ios-sidestore:
    name: iOS (SideStore — unsigned)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build unsigned IPA
        script: |
          flutter build ipa --release --no-codesign
          mkdir -p build/ios/ipa
          mkdir -p /tmp/ipa_root/Payload
          cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app /tmp/ipa_root/Payload/Runner.app
          cd /tmp/ipa_root && zip -r Runner.ipa Payload
          cp /tmp/ipa_root/Runner.ipa "$CM_BUILD_DIR/build/ios/ipa/Runner.ipa"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - lopemanollie@gmail.com
        notify:
          success: true
          failure: true

  # ── Android — signed release APK / AAB ──────────────────────────────────────
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
      groups:
        - android_signing  # configure in Codemagic UI → Team → Global variables
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.gradle/caches
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Write keystore from env
        script: |
          echo $CM_KEYSTORE | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF
      - name: Build APK + AAB
        script: |
          flutter build apk --release
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
    publishing:
      email:
        recipients:
          - lopemanollie@gmail.com
        notify:
          success: true
          failure: true